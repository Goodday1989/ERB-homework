<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- <link rel="stylesheet" href="./lightbox.css" /> -->
    <link rel="stylesheet" href="./self_lightbox.css" />
    <title>lightbox</title>
  </head>
  <body>
    <!-- Images used to open the lightbox -->
    <div class="">
      <div class="column">
        <img
          src="/pictures/uk_London-Eye.jpeg"
          onclick="
            openModal();
            currentSlide(1);
          "
          class="hover-shadow"
        />
      </div>
      <div class="column">
        <img
          src="/pictures/uk_London-Parliament.jpeg"
          onclick="
            openModal();
            currentSlide(2);
          "
          class="hover-shadow"
        />
      </div>
      <div class="column">
        <img
          src="/pictures/uk_London-Tower.jpg"
          onclick="
            openModal();
            currentSlide(3);
          "
          class="hover-shadow"
        />
      </div>
      <div class="column">
        <img
          src="/pictures/uk_St.-Pauls-Cathedral.jpeg"
          onclick="
            openModal();
            currentSlide(4);
          "
          class="hover-shadow"
        />
      </div>
      <div class="column">
        <img
          src="/pictures/uk_Tower-Bridge.jpeg"
          onclick="
            openModal();
            currentSlide(5);
          "
          class="hover-shadow"
        />
      </div>
      <div class="column">
        <img
          src="/pictures/uk_Westminster-Abbey.jpeg"
          onclick="
            openModal();
            currentSlide(6);
          "
          class="hover-shadow"
        />
      </div>
    </div>

    <!-- The Modal/Lightbox -->
    <div id="myModal" class="modal">
      <span class="close cursor" onclick="closeModal()">&times;</span>
      <div class="modal-content">
        <div class="mySlides">
          <div class="numbertext">1 / 6</div>
          <img src="/pictures/uk_London-Eye.jpeg" style="width: 100%" />
        </div>
        <div class="mySlides">
          <div class="numbertext">2 / 6</div>
          <img src="/pictures/uk_London-Parliament.jpeg" style="width: 100%" />
        </div>
        <div class="mySlides">
          <div class="numbertext">3 / 6</div>
          <img src="/pictures/uk_London-Tower.jpg" style="width: 100%" />
        </div>
        <div class="mySlides">
          <div class="numbertext">4 / 6</div>
          <img
            src="/pictures/uk_St.-Pauls-Cathedral.jpeg"
            style="width: 100%"
          />
        </div>
        <div class="mySlides">
          <div class="numbertext">5 / 6</div>
          <img src="/pictures/uk_Tower-Bridge.jpeg" style="width: 100%" />
        </div>
        <div class="mySlides">
          <div class="numbertext">6 / 6</div>
          <img src="/pictures/uk_Westminster-Abbey.jpeg" style="width: 100%" />
        </div>

        <!-- Next/previous controls -->
        <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
        <a class="next" onclick="plusSlides(1)">&#10095;</a>

        <!-- Caption text -->
        <div class="caption-container">
          <p id="caption"></p>
        </div>

        <!-- Thumbnail image controls -->
        <div class="column">
          <img
            class="demo"
            src="/pictures/uk_London-Eye.jpeg"
            onclick="currentSlide(1)"
            alt="Nature"
          />
        </div>
        <div class="column">
          <img
            class="demo"
            src="/pictures/uk_London-Parliament.jpeg"
            onclick="currentSlide(2)"
            alt="Snow"
          />
        </div>
        <div class="column">
          <img
            class="demo"
            src="/pictures/"
            onclick="currentSlide(3)"
            alt="Mountains"
          />
        </div>
        <div class="column">
          <img
            class="demo"
            src="img4.jpg"
            onclick="currentSlide(4)"
            alt="Lights"
          />
        </div>
        <div class="column">
          <img
            class="demo"
            src="img1.jpg"
            onclick="currentSlide(5)"
            alt="Nature"
          />
        </div>
        <div class="column">
          <img
            class="demo"
            src="img1.jpg"
            onclick="currentSlide(6)"
            alt="Nature"
          />
        </div>
      </div>
    </div>
    <script src="/lightbox_testground/lightbox.js"></script>
  </body>
</html>
